<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>热处理预装炉智能体 - 影在科技</title>
    <link rel="stylesheet" href="css/main.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
      "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "./js/app.js": "./js/app.js",
          "./js/three/scene.js": "./js/three/scene.js",
          "./js/packing/solver.js": "./js/packing/solver.js",
          "./js/ui/panel.js": "./js/ui/panel.js",
          "./js/ui/forms.js": "./js/ui/forms.js",
          "./js/data/store.js": "./js/data/store.js",
          "./js/utils/constants.js": "./js/utils/constants.js",
          "./js/utils/helpers.js": "./js/utils/helpers.js",
          "./PDF/exportPDF.js": "./PDF/exportPDF.js",
          "./PDF/createSummaryPage.js": "./PDF/createSummaryPage.js",
          "./PDF/createViewPage.js": "./PDF/createViewPage.js",
          "./PDF/legend.js": "./PDF/legend.js",
          "./PDF/ruler.js": "./PDF/ruler.js"
        }
      }
    </script>
</head>
<body>
    <div id="control-panel">
        <div class="panel-scroll">
            <h2>热处理预装炉智能体</h2>
            
            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h3 style="margin: 0;">1. 车间可用炉膛资产配置</h3>
                    <button class="btn btn-secondary" id="btn-add-furnace" style="width: auto; padding: 6px 12px; margin: 0; font-size: 11px;">+ 增加炉膛资产</button>
                </div>
                <div id="furnaces-container"></div>
                <div class="form-line" style="margin-top: 10px;">
                    <label>工件安全间距缓冲 (Spacing/mm) <input type="number" id="global-spacing" value="5"></label>
                </div>
            </div>

            <div class="section">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <h3 style="margin: 0;">2. 待处理预装物料明细</h3>
                    <button class="btn btn-secondary" id="btn-add-item" style="width: auto; padding: 6px 12px; margin: 0; font-size: 11px;">+ 增加工件批次</button>
                </div>
                <div id="items-container"></div>
            </div>
        </div>

        <div class="action-area">
            <button class="btn btn-primary" id="btn-calculate">生成多炉混合排布方案 🚀</button>
            <button class="btn btn-animate" id="btn-animate">逐步模拟装炉引导 🎬</button>
            <button class="btn btn-success" id="btn-export-pdf">导出混装方案 PDF 📄</button>
            <div style="margin-top: 10px; display: flex; gap: 8px;">
                <button class="btn btn-secondary" id="btn-view-front" style="flex:1; padding: 8px 0; font-size: 12px;">🔲 正视图</button>
                <button class="btn btn-secondary" id="btn-view-top" style="flex:1; padding: 8px 0; font-size: 12px;">🔲 顶视图</button>
                <button class="btn btn-secondary" id="btn-view-side" style="flex:1; padding: 8px 0; font-size: 12px;">🔲 侧视图</button>
                <button class="btn btn-secondary" id="btn-view-default" style="flex:1; padding: 8px 0; font-size: 12px;">🔄 3D默认</button>
            </div>
            <div id="furnace-toggles" style="display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;"></div>
            <div id="summary-stats">等待预装方案下发计算...</div>
        </div>
    </div>

    <div id="canvas-container"></div>
    <div id="pdf-hidden-template"></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
